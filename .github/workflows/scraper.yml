name: AI Flight Guardian Scraper

on:
    schedule:
    # Auto-generated by UI (Local Time UTC+8)
    - cron: '0 23 * * *'
    - cron: '30 3 * * *'
    - cron: '0 11 * * *'

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Main Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          python src/main.py

      - name: Commit and Push Records
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update flight records CSV [skip ci]"
          file_pattern: "records/*.csv"
